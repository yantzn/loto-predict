name: Terraform Infra

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-infra.yml'
  workflow_run:
    workflows: ["Deploy Function Source"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}
  FUNCTION_SOURCE_BUCKET: ${{ secrets.FUNCTION_SOURCE_BUCKET }}
  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}

  BQ_DATASET: ${{ vars.BQ_DATASET }}
  BQ_TABLE_LOTO6_HISTORY: ${{ vars.BQ_TABLE_LOTO6_HISTORY }}
  BQ_TABLE_LOTO7_HISTORY: ${{ vars.BQ_TABLE_LOTO7_HISTORY }}
  BQ_STAGING_TABLE_LOTO6: ${{ vars.BQ_STAGING_TABLE_LOTO6 }}
  BQ_STAGING_TABLE_LOTO7: ${{ vars.BQ_STAGING_TABLE_LOTO7 }}
  BQ_TABLE_PREDICTION_RUNS: ${{ vars.BQ_TABLE_PREDICTION_RUNS }}
  HISTORY_LIMIT_LOTO6: ${{ vars.HISTORY_LIMIT_LOTO6 }}
  HISTORY_LIMIT_LOTO7: ${{ vars.HISTORY_LIMIT_LOTO7 }}

  FETCH_FUNCTION_SOURCE_OBJECT: functions/fetch_loto_results/function-source.zip
  IMPORT_FUNCTION_SOURCE_OBJECT: functions/import_loto_results_to_bq/function-source.zip
  NOTIFY_FUNCTION_SOURCE_OBJECT: functions/generate_prediction_and_notify/function-source.zip

jobs:
  terraform:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="prefix=loto-predict/infra"

      - name: Terraform Fmt
        working-directory: infra
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        run: |
          terraform plan \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="source_bucket_name=${FUNCTION_SOURCE_BUCKET}" \
            -var="fetch_function_source_object=${FETCH_FUNCTION_SOURCE_OBJECT}" \
            -var="import_function_source_object=${IMPORT_FUNCTION_SOURCE_OBJECT}" \
            -var="notify_function_source_object=${NOTIFY_FUNCTION_SOURCE_OBJECT}" \
            -var="bigquery_dataset_id=${BQ_DATASET}" \
            -var="loto6_history_table_id=${BQ_TABLE_LOTO6_HISTORY}" \
            -var="loto7_history_table_id=${BQ_TABLE_LOTO7_HISTORY}" \
            -var="loto6_staging_table_id=${BQ_STAGING_TABLE_LOTO6}" \
            -var="loto7_staging_table_id=${BQ_STAGING_TABLE_LOTO7}" \
            -var="prediction_runs_table_id=${BQ_TABLE_PREDICTION_RUNS}" \
            -var="history_limit_loto6=${HISTORY_LIMIT_LOTO6}" \
            -var="history_limit_loto7=${HISTORY_LIMIT_LOTO7}" \
            -var="line_channel_access_token=${LINE_CHANNEL_ACCESS_TOKEN}" \
            -var="line_to_user_id=${LINE_TO_USER_ID}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan
