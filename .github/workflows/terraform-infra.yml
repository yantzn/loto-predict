name: Terraform Infra

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-infra.yml'
  workflow_run:
    workflows:
      - Deploy Function Source
    types:
      - completed
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: false
        default: "true"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  TFSTATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  FUNCTION_SOURCE_BUCKET: ${{ vars.FUNCTION_SOURCE_BUCKET }}

  WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ secrets.WIF_SERVICE_ACCOUNT }}

  FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL: ${{ secrets.FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL }}
  SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL }}

  LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
  LINE_TO_USER_ID: ${{ secrets.LINE_TO_USER_ID }}

  LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID: line-channel-access-token
  LINE_USER_ID_SECRET_ID: line-user-id

  FETCH_FUNCTION_SOURCE_OBJECT: functions/fetch_loto_results/function-source.zip
  IMPORT_FUNCTION_SOURCE_OBJECT: functions/import_loto_results_to_bq/function-source.zip
  NOTIFY_FUNCTION_SOURCE_OBJECT: functions/generate_prediction_and_notify/function-source.zip

  BQ_DATASET: ${{ vars.BQ_DATASET }}
  HISTORY_LIMIT_LOTO6: ${{ vars.HISTORY_LIMIT_LOTO6 }}
  HISTORY_LIMIT_LOTO7: ${{ vars.HISTORY_LIMIT_LOTO7 }}

jobs:
  terraform:
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Terraform plugin cache
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Verify required variables
        run: |
          set -euo pipefail

          test -n "${TFSTATE_BUCKET}"
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"
          test -n "${FUNCTION_SOURCE_BUCKET}"
          test -n "${FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL}"
          test -n "${SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL}"
          test -n "${LINE_CHANNEL_ACCESS_TOKEN}"
          test -n "${LINE_TO_USER_ID}"
          test -n "${LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID}"
          test -n "${LINE_USER_ID_SECRET_ID}"
          test -n "${BQ_DATASET}"
          test -n "${HISTORY_LIMIT_LOTO6}"
          test -n "${HISTORY_LIMIT_LOTO7}"

      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${TFSTATE_BUCKET}"

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: infra
        run: |
          terraform plan \
            -lock-timeout=5m \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="dataset_id=${BQ_DATASET}" \
            -var="source_bucket_name=${FUNCTION_SOURCE_BUCKET}" \
            -var="fetch_function_source_object=${FETCH_FUNCTION_SOURCE_OBJECT}" \
            -var="import_function_source_object=${IMPORT_FUNCTION_SOURCE_OBJECT}" \
            -var="notify_function_source_object=${NOTIFY_FUNCTION_SOURCE_OBJECT}" \
            -var="functions_runtime_service_account_email=${FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL}" \
            -var="scheduler_invoker_service_account_email=${SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL}" \
            -var="history_limit_loto6=${HISTORY_LIMIT_LOTO6}" \
            -var="history_limit_loto7=${HISTORY_LIMIT_LOTO7}" \
            -var="line_channel_access_token=${LINE_CHANNEL_ACCESS_TOKEN}" \
            -var="line_to_user_id=${LINE_TO_USER_ID}" \
            -var="line_channel_access_token_secret_id=${LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID}" \
            -var="line_user_id_secret_id=${LINE_USER_ID_SECRET_ID}" \
            -out=tfplan

      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infra/tfplan

      - name: Terraform apply (push)
        if: github.event_name == 'push'
        working-directory: infra
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      - name: Terraform apply (workflow_run)
        if: github.event_name == 'workflow_run'
        working-directory: infra
        run: terraform apply -lock-timeout=5m -auto-approve tfplan

      - name: Terraform apply (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
        working-directory: infra
        run: terraform apply -lock-timeout=5m -auto-approve tfplan
