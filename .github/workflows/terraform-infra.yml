name: Terraform Infra # GCPインフラ構築用ワークフロー

on:
  # mainブランチへのpushや手動実行で発火
  push:
    branches:
      - main
    paths:
      # インフラ定義・ワークフロー自身の変更時のみ発火
      - "infra/**"
      - ".github/workflows/terraform-infra.yml"
  workflow_dispatch:
permissions:
  # OIDC認証やリポジトリ参照用
  contents: read
  id-token: write
  actions: read

concurrency:
  # 同一ブランチでの同時apply競合防止
  group: infra-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # Terraform/GCP/シークレット等の環境変数
  TF_IN_AUTOMATION: true
  TF_INPUT: false
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  TFSTATE_BUCKET: ${{ vars.TFSTATE_BUCKET }}
  FUNCTION_SOURCE_BUCKET: ${{ vars.FUNCTION_SOURCE_BUCKET }}
  BQ_DATASET: ${{ vars.BQ_DATASET }}
  HISTORY_LIMIT_LOTO6: ${{ vars.HISTORY_LIMIT_LOTO6 }}
  HISTORY_LIMIT_LOTO7: ${{ vars.HISTORY_LIMIT_LOTO7 }}
  LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID: ${{ vars.LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID }}
  LINE_CHANNEL_ACCESS_TOKEN_SECRET_VERSION: ${{ vars.LINE_CHANNEL_ACCESS_TOKEN_SECRET_VERSION }}
  LINE_USER_ID_SECRET_ID: ${{ vars.LINE_USER_ID_SECRET_ID }}
  LINE_USER_ID_SECRET_VERSION: ${{ vars.LINE_USER_ID_SECRET_VERSION }}

jobs:
  # Terraformによるインフラ構築
  terraform:
    runs-on: ubuntu-latest

    defaults:
      # infra/配下でコマンド実行
      run:
        shell: bash
        working-directory: infra

    steps:
      # コードチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create plugin cache dir # プラグインキャッシュ
        run: mkdir -p "$TF_PLUGIN_CACHE_DIR"

      - name: Validate required variables # GCP/TF変数の未設定チェック
        run: |
          set -euo pipefail
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"
          test -n "${TFSTATE_BUCKET}"
          test -n "${FUNCTION_SOURCE_BUCKET}"
          test -n "${BQ_DATASET}"
          test -n "${HISTORY_LIMIT_LOTO6}"
          test -n "${HISTORY_LIMIT_LOTO7}"
          test -n "${LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID}"
          test -n "${LINE_USER_ID_SECRET_ID}"

      - name: Authenticate to Google Cloud # OIDC認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud # gcloud CLIセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform # Terraformセットアップ
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt # フォーマットチェック
        run: terraform fmt -check -recursive

      - name: Terraform init # 初期化
        run: |
          set -euo pipefail
          terraform init -reconfigure \
            -backend-config="bucket=${TFSTATE_BUCKET}"

      - name: Terraform validate # 構文バリデーション
        run: terraform validate

      - name: Terraform plan # 変更プラン作成
        env:
          FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL: ${{ secrets.FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL }}
          SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL: ${{ secrets.SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL }}
          CLOUD_RUN_JOBS_SERVICE_ACCOUNT_EMAIL: ${{ secrets.CLOUD_RUN_JOBS_SERVICE_ACCOUNT_EMAIL }}
        run: |
          set -euo pipefail
          test -n "${FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL}"
          test -n "${SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL}"
          test -n "${CLOUD_RUN_JOBS_SERVICE_ACCOUNT_EMAIL}"
          terraform plan \
            -lock-timeout=5m \
            -var="project_id=${GCP_PROJECT_ID}" \
            -var="region=${GCP_REGION}" \
            -var="dataset_id=${BQ_DATASET}" \
            -var="source_bucket_name=${FUNCTION_SOURCE_BUCKET}" \
            -var="history_limit_loto6=${HISTORY_LIMIT_LOTO6}" \
            -var="history_limit_loto7=${HISTORY_LIMIT_LOTO7}" \
            -var="line_channel_access_token_secret_id=${LINE_CHANNEL_ACCESS_TOKEN_SECRET_ID}" \
            -var="line_channel_access_token_secret_version=${LINE_CHANNEL_ACCESS_TOKEN_SECRET_VERSION:-1}" \
            -var="line_user_id_secret_id=${LINE_USER_ID_SECRET_ID}" \
            -var="line_user_id_secret_version=${LINE_USER_ID_SECRET_VERSION:-1}" \
            -var="functions_runtime_service_account_email=${FUNCTIONS_RUNTIME_SERVICE_ACCOUNT_EMAIL}" \
            -var="scheduler_invoker_service_account_email=${SCHEDULER_INVOKER_SERVICE_ACCOUNT_EMAIL}" \
            -var="cloud_run_jobs_service_account_email=${CLOUD_RUN_JOBS_SERVICE_ACCOUNT_EMAIL}" \
            -out=tfplan

      - name: Terraform apply # 本番apply（mainブランチのみ）
        if: github.ref == 'refs/heads/main'
        run: terraform apply -lock-timeout=5m -auto-approve tfplan
