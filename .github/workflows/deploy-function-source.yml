name: Deploy GCP Cloud Functions Source # Cloud Functionsコードデプロイ用ワークフロー

on:
  # Cloud Functions のコード変更時にデプロイ。
  push:
    branches:
      - main
    paths:
      # 関数・依存コード・スクリプト・ワークフローの変更時にのみ発火
      - "functions/**"
      - "src/**"
      - "requirements-base.txt"
      - "requirements-local.txt"
      - ".github/scripts/package_functions.sh"
      - ".github/workflows/deploy-function-source.yml"
  # Terraform Infra 完了後に自動実行
  workflow_run:
    workflows: [ "Terraform Infra" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:
permissions:
  # OIDC認証やリポジトリ参照用
  contents: read
  id-token: write
  actions: read

concurrency:
  # 同一ブランチでの同時デプロイ競合防止
  group: app-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # GCPプロジェクト・リージョン・Cloud Functions用バケット等の環境変数
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  SOURCE_BUCKET_NAME: ${{ vars.FUNCTION_SOURCE_BUCKET }}

  FETCH_OBJECT: functions/fetch_loto_results/function-source.zip
  IMPORT_OBJECT: functions/import_loto_results_to_bq/function-source.zip
  NOTIFY_OBJECT: functions/generate_prediction_and_notify/function-source.zip

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    # このworkflowの責務は source zip 作成・GCS更新・Cloud Functions更新。
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Terraform Infra if running # Terraform実行中は完了待機、失敗時は中断
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW_FILE: terraform-infra.yml
        run: |
          set -euo pipefail

          api_base="https://api.github.com/repos/${REPO}/actions"

          active_run_id="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_base}/workflows/${WORKFLOW_FILE}/runs?branch=${BRANCH}&per_page=20" | python -c "import json,sys; runs=json.load(sys.stdin).get('workflow_runs',[]); active=[r for r in runs if r.get('status') in ('queued','in_progress')]; print(active[0]['id'] if active else '')")"

          if [[ -z "${active_run_id}" ]]; then
            echo "No active Terraform Infra run found on branch ${BRANCH}."
            exit 0
          fi

          echo "Waiting for Terraform Infra run: ${active_run_id}"
          for _ in $(seq 1 240); do
            read -r status conclusion < <(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_base}/runs/${active_run_id}" | python -c "import json,sys; r=json.load(sys.stdin); print(r.get('status',''), r.get('conclusion',''))")

            echo "Terraform Infra status=${status} conclusion=${conclusion}"

            if [[ "${status}" == "completed" ]]; then
              if [[ "${conclusion}" == "success" ]]; then
                echo "Terraform Infra completed successfully."
                exit 0
              fi
              echo "Terraform Infra finished with conclusion=${conclusion}. Stop this workflow." >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for Terraform Infra run ${active_run_id}." >&2
          exit 1

      - name: Validate required variables # GCP変数の未設定チェック
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"
          test -n "${SOURCE_BUCKET_NAME}"

      - name: Authenticate to Google Cloud # OIDC認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud # gcloud CLIセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python # パッケージング用Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package functions # 関数zip生成
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./.github/scripts/package_functions.sh
          bash ./.github/scripts/package_functions.sh

      - name: Verify packaged archives # zip生成確認
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/fetch_loto_results.zip
          test -f dist/import_loto_results_to_bq.zip
          test -f dist/generate_prediction_and_notify.zip

      - name: Upload packaged archives to source bucket # GCSアップロード
        shell: bash
        run: |
          set -euo pipefail
          gcloud storage cp dist/fetch_loto_results.zip gs://${SOURCE_BUCKET_NAME}/${FETCH_OBJECT}
          gcloud storage cp dist/import_loto_results_to_bq.zip gs://${SOURCE_BUCKET_NAME}/${IMPORT_OBJECT}
          gcloud storage cp dist/generate_prediction_and_notify.zip gs://${SOURCE_BUCKET_NAME}/${NOTIFY_OBJECT}

      - name: Deploy Cloud Functions # Cloud Functionsを新しいコードで更新
        shell: bash
        run: |
          set -euo pipefail

          gcloud functions deploy fetch-loto-results \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --source=gs://${SOURCE_BUCKET_NAME}/${FETCH_OBJECT} \
            --gen2

          gcloud functions deploy import-loto-results-to-bq \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --source=gs://${SOURCE_BUCKET_NAME}/${IMPORT_OBJECT} \
            --gen2

          gcloud functions deploy generate-prediction-and-notify \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --source=gs://${SOURCE_BUCKET_NAME}/${NOTIFY_OBJECT} \
            --gen2
