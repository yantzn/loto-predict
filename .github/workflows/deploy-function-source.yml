name: Deploy Function Source

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'src/**'
      - 'scripts/package_functions.sh'
      - '.github/workflows/deploy-function-source.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  SOURCE_BUCKET_NAME: ${{ secrets.FUNCTION_SOURCE_BUCKET }}

jobs:
  deploy-function-source:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Package functions
        run: |
          bash ./scripts/package_functions.sh

      - name: Upload fetch_loto_results source
        run: |
          gcloud storage cp \
            dist/fetch_loto_results.zip \
            gs://${SOURCE_BUCKET_NAME}/functions/fetch_loto_results/function-source.zip

      - name: Upload import_loto_results_to_bq source
        run: |
          gcloud storage cp \
            dist/import_loto_results_to_bq.zip \
            gs://${SOURCE_BUCKET_NAME}/functions/import_loto_results_to_bq/function-source.zip

      - name: Upload generate_prediction_and_notify source
        run: |
          gcloud storage cp \
            dist/generate_prediction_and_notify.zip \
            gs://${SOURCE_BUCKET_NAME}/functions/generate_prediction_and_notify/function-source.zip
