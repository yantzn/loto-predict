name: Deploy Function Source

on:
  push:
    branches:
      - main
    paths:
      - 'main.py'
      - 'requirements.txt'
      - 'config/**'
      - 'utils/**'
      - 'domain/**'
      - 'infrastructure/**'
      - 'usecases/**'
      - '.github/workflows/deploy-function-source.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  SOURCE_BUCKET_NAME: ${{ vars.SOURCE_BUCKET_NAME }}
  FUNCTION_SOURCE_OBJECT: ${{ vars.FUNCTION_SOURCE_OBJECT }}

jobs:

  package-and-upload:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create fetch_loto_results archive
        run: |
          cd functions/fetch_loto_results
          zip -r function-source.zip main.py
          gsutil cp function-source.zip "gs://${SOURCE_BUCKET_NAME}/functions/fetch_loto_results/function-source.zip"

      - name: Create import_loto_results_to_bq archive
        run: |
          cd ../../functions/import_loto_results_to_bq
          zip -r function-source.zip main.py
          gsutil cp function-source.zip "gs://${SOURCE_BUCKET_NAME}/functions/import_loto_results_to_bq/function-source.zip"

      - name: Create generate_prediction_and_notify archive
        run: |
          cd ../../functions/generate_prediction_and_notify
          zip -r function-source.zip main.py
          gsutil cp function-source.zip "gs://${SOURCE_BUCKET_NAME}/functions/generate_prediction_and_notify/function-source.zip"
