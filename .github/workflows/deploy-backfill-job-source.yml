
name: Deploy Backfill Job Source # Cloud Run Job (backfill) 用image更新ワークフロー

on:
  # mainブランチへのpushや手動実行で発火
  push:
    branches:
      - main
    paths:
      # バックフィルジョブや依存コード・スクリプト・ワークフローの変更時にのみ発火
      - "jobs/backfill_loto_history/**"
      - "src/**"
      - "requirements-base.txt"
      - ".github/scripts/sync_job_requirements.sh"
      - ".github/workflows/deploy-backfill-job-source.yml"
  workflow_dispatch:

permissions:
  # OIDC認証やリポジトリ参照用
  contents: read
  id-token: write
  actions: read

concurrency:
  # 同一ブランチでの同時デプロイ競合防止
  group: app-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # GCPプロジェクト・リージョン・ジョブ名等の環境変数
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: backfill-loto-history
  BACKFILL_IMAGE_URI: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/loto-predict/backfill-loto-history:latest
  BACKFILL_DEFAULT_LOTTERY_TYPE: ${{ vars.BACKFILL_DEFAULT_LOTTERY_TYPE || 'loto6' }}
  BACKFILL_DEFAULT_START_DATE: ${{ vars.BACKFILL_DEFAULT_START_DATE || '2026-01-01' }}
  BACKFILL_DEFAULT_END_DATE: ${{ vars.BACKFILL_DEFAULT_END_DATE || '2026-12-31' }}
  BACKFILL_DEFAULT_OUTPUT_PATH: ${{ vars.BACKFILL_DEFAULT_OUTPUT_PATH || '' }}

jobs:
  build-and-push:
    # Cloud Run Jobイメージのビルド・保存までを担当
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required variables # GCP変数の未設定チェック
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"

      - name: Authenticate to Google Cloud # OIDC認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud # gcloud CLIセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate job requirements.txt # 依存requirements生成
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./.github/scripts/sync_job_requirements.sh
          bash ./.github/scripts/sync_job_requirements.sh

      - name: Build and push backfill image # Cloud Buildでimageを保存
        shell: bash
        run: |
          set -euo pipefail
          BUILD_ID="$(gcloud builds submit jobs/backfill_loto_history \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --tag="${BACKFILL_IMAGE_URI}" \
            --async \
            --format='value(id)')"

          test -n "${BUILD_ID}"
          echo "Started Cloud Build: ${BUILD_ID}"

          while true; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" \
              --project="${GCP_PROJECT_ID}" \
              --region="${GCP_REGION}" \
              --format='value(status)')"

            echo "Cloud Build status: ${STATUS}"
            case "${STATUS}" in
              SUCCESS)
                break
                ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED)
                echo "Cloud Build failed: ${BUILD_ID}" >&2
                gcloud builds describe "${BUILD_ID}" \
                  --project="${GCP_PROJECT_ID}" \
                  --region="${GCP_REGION}" \
                  --format='yaml(status,statusDetail,logUrl,failureInfo,warnings,images)' || true
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done

      - name: Complete image update # 実デプロイは Terraform workflow 側で実施
        shell: bash
        run: |
          set -euo pipefail
          echo "Backfill image was pushed: ${BACKFILL_IMAGE_URI}"
          echo "Terraform Infra workflow will apply this image to Cloud Run Job."
