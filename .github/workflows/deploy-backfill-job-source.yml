
name: Deploy Backfill Job Source # Cloud Run Job (backfill) コードデプロイ用ワークフロー

on:
  # mainブランチへのpushや手動実行で発火
  push:
    branches:
      - main
    paths:
      # バックフィルジョブや依存コード・スクリプト・ワークフローの変更時にのみ発火
      - "jobs/backfill_loto_history/**"
      - "src/**"
      - "requirements-base.txt"
      - ".github/scripts/sync_job_requirements.sh"
      - ".github/workflows/deploy-backfill-job-source.yml"
  # Terraform Infra 完了後に自動実行
  workflow_run:
    workflows: [ "Terraform Infra" ]
    branches: [ main ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  # OIDC認証やリポジトリ参照用
  contents: read
  id-token: write
  actions: read

concurrency:
  # 同一ブランチでの同時デプロイ競合防止
  group: app-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  # GCPプロジェクト・リージョン・ジョブ名等の環境変数
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  JOB_NAME: backfill-loto-history
  BACKFILL_DEFAULT_LOTTERY_TYPE: ${{ vars.BACKFILL_DEFAULT_LOTTERY_TYPE || 'loto6' }}
  BACKFILL_DEFAULT_START_DATE: ${{ vars.BACKFILL_DEFAULT_START_DATE || '2026-01-01' }}
  BACKFILL_DEFAULT_END_DATE: ${{ vars.BACKFILL_DEFAULT_END_DATE || '2026-12-31' }}
  BACKFILL_DEFAULT_OUTPUT_PATH: ${{ vars.BACKFILL_DEFAULT_OUTPUT_PATH || '' }}

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    # Cloud Run Jobへソースから直接デプロイする
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Terraform Infra if running # Terraform実行中は完了待機、失敗時は中断
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW_FILE: terraform-infra.yml
        run: |
          set -euo pipefail

          api_base="https://api.github.com/repos/${REPO}/actions"

          active_run_id="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_base}/workflows/${WORKFLOW_FILE}/runs?branch=${BRANCH}&per_page=20" | python -c "import json,sys; runs=json.load(sys.stdin).get('workflow_runs',[]); active=[r for r in runs if r.get('status') in ('queued','in_progress')]; print(active[0]['id'] if active else '')")"

          if [[ -z "${active_run_id}" ]]; then
            echo "No active Terraform Infra run found on branch ${BRANCH}."
            exit 0
          fi

          echo "Waiting for Terraform Infra run: ${active_run_id}"
          for _ in $(seq 1 240); do
            read -r status conclusion < <(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_base}/runs/${active_run_id}" | python -c "import json,sys; r=json.load(sys.stdin); print(r.get('status',''), r.get('conclusion',''))")

            echo "Terraform Infra status=${status} conclusion=${conclusion}"

            if [[ "${status}" == "completed" ]]; then
              if [[ "${conclusion}" == "success" ]]; then
                echo "Terraform Infra completed successfully."
                exit 0
              fi
              echo "Terraform Infra finished with conclusion=${conclusion}. Stop this workflow." >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for Terraform Infra run ${active_run_id}." >&2
          exit 1

      - name: Validate required variables # GCP変数の未設定チェック
        shell: bash
        run: |
          set -euo pipefail
          test -n "${GCP_PROJECT_ID}"
          test -n "${GCP_REGION}"

      - name: Authenticate to Google Cloud # OIDC認証
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud # gcloud CLIセットアップ
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate job requirements.txt # 依存requirements生成
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./.github/scripts/sync_job_requirements.sh
          bash ./.github/scripts/sync_job_requirements.sh

      - name: Deploy Cloud Run Job from source # Cloud Run Jobデプロイ
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_PATH="${BACKFILL_DEFAULT_OUTPUT_PATH}"
          if [[ -z "${OUTPUT_PATH}" ]]; then
            OUTPUT_PATH="gs://${GCP_PROJECT_ID}-loto-raw/backfill/default.csv"
          fi

          gcloud run jobs deploy "${JOB_NAME}" \
            --project="${GCP_PROJECT_ID}" \
            --region="${GCP_REGION}" \
            --source=jobs/backfill_loto_history \
            --command=/cnb/lifecycle/launcher \
            --args="python,main.py,--lottery-type,${BACKFILL_DEFAULT_LOTTERY_TYPE},--start-date,${BACKFILL_DEFAULT_START_DATE},--end-date,${BACKFILL_DEFAULT_END_DATE},--output-path,${OUTPUT_PATH}"
